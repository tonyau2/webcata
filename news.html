<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ข่าววันนี้ บันเทิง บ้านเมือง อัปเดตทุกชั่วโมง | มีโปรมาบอก</title>
<meta name="description" content="รวมข่าวบันเทิง ข่าวบ้านเมือง อัปเดตทุกชั่วโมง อ่านง่าย สรุปสั้น พร้อมลิงก์ไปอ่านฉบับเต็มจากต้นฉบับ">

<meta property="og:type" content="website">
<meta property="og:title" content="ข่าววันนี้ บันเทิง บ้านเมือง อัปเดตทุกชั่วโมง | มีโปรมาบอก">
<meta property="og:description" content="รวมข่าวบันเทิง ข่าวบ้านเมือง อัปเดตทุกชั่วโมง อ่านง่าย สรุปสั้น พร้อมลิงก์ไปอ่านฉบับเต็มจากต้นฉบับ">
<meta property="og:site_name" content="มีโปรมาบอก">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23C8102E'/><text x='50' y='71' text-anchor='middle' font-size='60' font-family='Helvetica,Arial,sans-serif' font-weight='700' fill='%23fff'>%25</text></svg>">
<meta name="theme-color" content="#FFF3EA">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Trirong:wght@500;600&family=Anuphan:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:  #FFF3EA;
    --surface:#FFFFFF;
    --ink:    #2B0D13;
    --dim:    #6E5A52;
    --red:    #E01B3D;
    --red-2:  #A50F2A;
    --flame:  #FF6A2B;
    --gold:   #C9992F;
    --gold-hi:#F0D488;
    --hair:   rgba(43,13,19,.10);
    --hair-2: rgba(43,13,19,.20);
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{ background:var(--paper); color:var(--ink); font-family:'Anuphan',sans-serif; line-height:1.55; -webkit-font-smoothing:antialiased; }
  img{ display:block; max-width:100%; }

  .masthead{ position:sticky; top:0; z-index:60; background:rgba(251,246,242,.92); backdrop-filter:blur(14px); border-bottom:1px solid var(--hair); }
  .crest{ display:flex; align-items:center; gap:10px; max-width:1180px; margin:0 auto; padding:10px 16px 7px; }
  .crest-txt{ flex:1; min-width:0; }
  .logo{ width:34px; height:34px; flex:0 0 auto; border-radius:9px; background:linear-gradient(160deg, var(--red), var(--red-2)); color:#fff; display:grid; place-items:center; font-weight:700; font-size:18px; box-shadow:0 2px 8px rgba(200,16,46,.28); }
  .logo.img-mode{ background:none; box-shadow:none; padding:0; border-radius:0; line-height:0; }
  .logo.img-mode img{ display:block; height:46px; width:auto; max-width:190px; object-fit:contain; }
  .wordmark{ font-family:'Trirong',serif; font-weight:600; font-size:19px; line-height:1.2; color:var(--ink); }
  .motto{ font-size:11.5px; font-weight:600; color:var(--red); }
  .home-link{
    flex:0 0 auto; display:inline-flex; align-items:center; gap:5px;
    border:1px solid var(--hair); background:var(--surface); color:var(--ink);
    border-radius:8px; padding:7px 12px; text-decoration:none;
    font-size:12.5px; font-weight:600;
  }
  .home-link:hover{ border-color:var(--hair-2); }

  .pills{ display:flex; gap:7px; max-width:1180px; margin:0 auto; padding:0 16px 12px; overflow-x:auto; scrollbar-width:none; }
  .pills::-webkit-scrollbar{ display:none; }
  .pill{
    flex:0 0 auto; background:var(--surface); border:1px solid var(--hair); color:var(--ink);
    font-family:'Anuphan',sans-serif; font-size:13px; font-weight:500;
    padding:6px 14px; border-radius:8px; cursor:pointer; white-space:nowrap;
    transition:border-color .15s ease, background .15s ease, color .15s ease;
  }
  .pill:hover{ border-color:var(--hair-2); }
  .pill[aria-selected="true"]{ background:var(--ink); color:#fff; border-color:var(--ink); font-weight:600; }

  .wrap{ max-width:1180px; margin:0 auto; padding:20px 16px 44px; }
  .rule{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .rule h1{ font-family:'Trirong',serif; font-weight:600; font-size:19px; color:var(--ink); white-space:nowrap; }
  .rule i{ flex:1; height:1px; background:var(--hair); }
  .rule span{ font-size:11.5px; color:var(--dim); white-space:nowrap; }

  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  @media(min-width:620px){ .grid{ grid-template-columns:repeat(3,1fr); gap:15px; } }
  @media(min-width:900px){ .grid{ grid-template-columns:repeat(4,1fr); gap:17px; } }

  .card{
    display:flex; flex-direction:column; text-decoration:none; color:inherit;
    background:var(--surface); border:1px solid var(--hair); border-radius:12px; overflow:hidden;
    transition:border-color .18s ease, box-shadow .18s ease, transform .12s ease;
  }
  .card:hover{ border-color:var(--hair-2); box-shadow:0 6px 18px rgba(36,16,20,.08); }
  .card:active{ transform:scale(.985); }
  .card-media{ position:relative; aspect-ratio:16/10; background:#F2EAE4; overflow:hidden; }
  .card-media img{ width:100%; height:100%; object-fit:cover; transition:transform .45s cubic-bezier(.33,1,.68,1); }
  .card:hover .card-media img{ transform:scale(1.05); }
  .card-cat{
    position:absolute; top:8px; left:8px; z-index:2;
    background:linear-gradient(160deg, var(--red), var(--red-2)); color:#fff;
    font-size:11px; font-weight:700; padding:3px 9px; border-radius:7px;
    box-shadow:0 3px 10px rgba(224,27,61,.35);
  }
  .card-body{ padding:10px 12px 12px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .card-title{
    font-size:13.5px; font-weight:600; line-height:1.45; color:var(--ink);
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }
  .card-meta{ margin-top:auto; display:flex; align-items:center; gap:6px; font-size:11px; color:var(--dim); }
  .card-meta b{ color:var(--red-2); font-weight:700; }
  .card-cta{ font-size:11.5px; font-weight:600; color:var(--gold); display:inline-flex; align-items:center; gap:4px; }
  .card-cta::after{ content:'→'; transition:transform .18s ease; }
  .card:hover .card-cta::after{ transform:translateX(3px); }

  .more{
    display:block; margin:22px auto 0; background:var(--surface);
    border:1px solid var(--hair); color:var(--ink);
    border-radius:8px; padding:10px 28px; cursor:pointer;
    font-family:'Anuphan',sans-serif; font-size:13px;
  }
  .more:hover{ border-color:var(--hair-2); }
  .notice{
    max-width:1180px; margin:16px auto 0; padding:10px 14px;
    background:#FFF9EE; border:1px solid rgba(201,153,47,.35);
    border-radius:9px; color:#7A6034; font-size:11.5px; line-height:1.55;
  }
  .msg{ grid-column:1/-1; text-align:center; color:var(--dim); font-size:14px; padding:44px 12px; }

  .sk{ background:var(--surface); border:1px solid var(--hair); border-radius:12px; overflow:hidden; }
  .sk-img{ aspect-ratio:16/10; background:#F2EAE4; }
  .sk-line{ height:9px; margin:10px 11px; border-radius:5px;
    background:linear-gradient(90deg, rgba(36,16,20,.05) 25%, rgba(36,16,20,.11) 37%, rgba(36,16,20,.05) 63%);
    background-size:400% 100%; animation:shim 1.4s ease infinite; }
  .sk-line.short{ width:52%; }
  @keyframes shim{ from{ background-position:100% 0; } to{ background-position:-100% 0; } }

  .rv{ opacity:0; transform:translateY(14px); }
  .rv.in{ opacity:1; transform:none; transition:opacity .5s cubic-bezier(.22,1,.36,1), transform .5s cubic-bezier(.22,1,.36,1); }

  .alertbar{ display:none; margin:0; padding:11px 14px; background:#3B0A12; color:#FFD9DE; font-size:12.5px; line-height:1.5; border-bottom:2px solid var(--red); }

  :focus-visible{ outline:2px solid var(--red); outline-offset:2px; }
  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
    html{ scroll-behavior:auto; }
    .rv{ opacity:1 !important; transform:none !important; }
  }
</style>
</head>
<body>

<div class="alertbar" id="alertbar"></div>

<header class="masthead">
  <div class="crest">
    <div class="logo">%</div>
    <div class="crest-txt">
      <div class="wordmark">มีโปรมาบอก</div>
      <div class="motto" id="motto">ข่าววันนี้ อัปเดตทุกชั่วโมง</div>
    </div>
    <a class="home-link" href="index.html">🏠 หน้าโปรโมชั่น</a>
  </div>
  <div class="pills" id="pills" role="tablist"></div>
</header>

<main class="wrap">
  <div class="rule">
    <h1 id="rule-title">ข่าวทั้งหมด</h1>
    <i></i>
    <span id="rule-count"></span>
  </div>
  <div class="grid" id="grid">
    <div class="sk"><div class="sk-img"></div><div class="sk-line"></div><div class="sk-line short"></div></div>
    <div class="sk"><div class="sk-img"></div><div class="sk-line"></div><div class="sk-line short"></div></div>
    <div class="sk"><div class="sk-img"></div><div class="sk-line"></div><div class="sk-line short"></div></div>
    <div class="sk"><div class="sk-img"></div><div class="sk-line"></div><div class="sk-line short"></div></div>
  </div>
  <button class="more" id="more" hidden>ดูข่าวเพิ่ม</button>
  <div class="notice">ℹ️ ข่าวทั้งหมดดึงมาจากสำนักข่าวต้นทางอัตโนมัติ กดที่ข่าวเพื่ออ่านฉบับเต็มจากเว็บต้นฉบับโดยตรง</div>
</main>

<script src="config.js"></script>
<script>
  var CFG        = (typeof window.CATA === 'object' && window.CATA) ? window.CATA : {};
  var WEBAPP_URL = String(CFG.webapp || '');
  var LOGO_URL   = String(CFG.logo   || '');
  var PAGE_SIZE  = 12;

  var CAT_ORDER = ['บันเทิง','บ้านเมือง','กระแส'];
  var CAT_ICON  = {'บันเทิง':'🎬','บ้านเมือง':'🏛️','กระแส':'🔥'};
  var ICON_POOL = ['📰','🗞️','⭐','💬','🌐','📌'];
  function catIcon_(c){
    if(CAT_ICON[c]) return CAT_ICON[c];
    var h=0; for(var i=0;i<c.length;i++) h=(h*31+c.charCodeAt(i))>>>0;
    return ICON_POOL[h % ICON_POOL.length];
  }

  var elPills=document.getElementById('pills'), elGrid=document.getElementById('grid'),
      elMore=document.getElementById('more'), elTitle=document.getElementById('rule-title'),
      elCount=document.getElementById('rule-count');

  var all=[], cats=[], current='all', shown=PAGE_SIZE;

  function esc(s){
    return String(s===null||s===undefined?'':s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  var IMG_PLACEHOLDER = "data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20100%2062%22%3E%3Crect%20width=%22100%22%20height=%2262%22%20fill=%22%23F2EAE4%22/%3E%3Ctext%20x=%2250%22%20y=%2235%22%20text-anchor=%22middle%22%20font-size=%2210%22%20font-family=%22sans-serif%22%20fill=%22%23C9A98F%22%3Eไม่มีรูป%3C/text%3E%3C/svg%3E";
  document.addEventListener('error', function(e){
    var t=e.target;
    if(t && t.tagName==='IMG' && !t.dataset.fb){ t.dataset.fb='1'; t.src=IMG_PLACEHOLDER; }
  }, true);

  function timeAgo(pubDateText){
    if(!pubDateText) return '';
    var iso = String(pubDateText).trim().replace(' ','T') + ':00';
    var t = new Date(iso).getTime();
    if(isNaN(t)) return '';
    var diff = Date.now() - t;
    if(diff < 0) diff = 0;
    var m = Math.floor(diff/60000), h = Math.floor(diff/3600000), d = Math.floor(diff/86400000);
    if(d >= 1) return d+' วันที่แล้ว';
    if(h >= 1) return h+' ชม.ที่แล้ว';
    if(m >= 1) return m+' นาทีที่แล้ว';
    return 'เมื่อสักครู่';
  }
  function pubMs(pubDateText){
    var iso = String(pubDateText||'').trim().replace(' ','T') + ':00';
    var t = new Date(iso).getTime();
    return isNaN(t) ? 0 : t;
  }

  function track(type, link, cat){
    try{
      if(WEBAPP_URL.indexOf('http')!==0) return;
      new Image().src = WEBAPP_URL+'?log=1'
        + '&type='+encodeURIComponent(type)
        + '&name='+encodeURIComponent(String(link||'').slice(0,100))
        + '&cat='+encodeURIComponent(String(cat||'').slice(0,60))
        + '&t='+Date.now();
    }catch(e){}
  }
  document.addEventListener('click', function(e){
    var a=e.target.closest('a[data-news]');
    if(a) track('news_click', a.dataset.link, a.dataset.cat);
  });

  var io = ('IntersectionObserver' in window) ? new IntersectionObserver(function(es){
    es.forEach(function(e){
      if(!e.isIntersecting) return;
      e.target.classList.add('in');
      io.unobserve(e.target);
    });
  }, { rootMargin:'0px 0px -8% 0px', threshold:.05 }) : null;
  function revealIn(scope){
    if(!io) return;
    var els=(scope||document).querySelectorAll('.card:not(.in)');
    for(var i=0;i<els.length;i++){
      els[i].classList.add('rv');
      els[i].style.transitionDelay = Math.min(i,8)*45 + 'ms';
      io.observe(els[i]);
    }
  }

  function listFor(c){
    if(c==='all') return all;
    return all.filter(function(n){ return String(n.Category).trim()===c; });
  }
  function renderPills(){
    var html='<button class="pill" role="tab" data-c="all"'+(current==='all'?' aria-selected="true"':'')+'>ทั้งหมด</button>';
    cats.forEach(function(c){
      html+='<button class="pill" role="tab" data-c="'+esc(c)+'"'+(current===c?' aria-selected="true"':'')
          +'>'+catIcon_(c)+' '+esc(c)+'</button>';
    });
    elPills.innerHTML=html;
  }
  function cardHtml(n){
    var link=String(n.Link||'#');
    var img=String(n.ImageURL||'')||IMG_PLACEHOLDER;
    return '<a class="card" href="'+esc(link)+'" target="_blank" rel="noopener" data-news="1" data-link="'+esc(link)+'" data-cat="'+esc(n.Category||'')+'">'
      + '<div class="card-media"><img loading="lazy" decoding="async" alt="'+esc(n.Title)+'" src="'+esc(img)+'">'
      + (n.Category ? '<span class="card-cat">'+esc(n.Category)+'</span>' : '')
      + '</div>'
      + '<div class="card-body">'
      + '<div class="card-title">'+esc(n.Title)+'</div>'
      + '<div class="card-meta">'+(n.Source?'<b>'+esc(n.Source)+'</b> · ':'')+esc(timeAgo(n.PubDate))+'</div>'
      + '<span class="card-cta">อ่านข่าวเต็ม</span>'
      + '</div></a>';
  }
  function renderGrid(){
    var list=listFor(current);
    elTitle.textContent = current==='all' ? 'ข่าวทั้งหมด' : (catIcon_(current)+' '+current);
    elCount.textContent = list.length ? list.length+' ข่าว' : '';
    if(!list.length){
      elGrid.innerHTML = '<div class="msg">ยังไม่มีข่าวในหมวดนี้ ลองเลือกหมวดอื่นดูนะครับ</div>';
      elMore.hidden=true; return;
    }
    elGrid.innerHTML = list.slice(0, shown).map(cardHtml).join('');
    elMore.hidden = list.length <= shown;
    revealIn(elGrid);
  }
  function select(c){
    current=c; shown=PAGE_SIZE;
    renderPills(); renderGrid();
    window.scrollTo({ top:0, behavior:'smooth' });
  }
  elPills.addEventListener('click', function(e){
    var b=e.target.closest('.pill'); if(b) select(b.dataset.c);
  });
  elMore.addEventListener('click', function(){ shown+=PAGE_SIZE; renderGrid(); });

  function fail(m){
    var ab=document.getElementById('alertbar');
    if(ab){ ab.innerHTML='<b>โหลดข่าวไม่สำเร็จ</b> — '+esc(m); ab.style.display='block'; }
    elGrid.innerHTML='<div class="msg">โหลดข่าวไม่สำเร็จ: '+esc(m)+'</div>';
    elMore.hidden=true;
  }
  function build(data){
    all = (data && data.news) ? data.news : [];
    all.sort(function(a,b){ return pubMs(b.PubDate) - pubMs(a.PubDate); });

    var seen={};
    all.forEach(function(n){ var c=String(n.Category).trim(); if(c) seen[c]=1; });
    cats = CAT_ORDER.filter(function(c){ return seen[c]; })
      .concat(Object.keys(seen).filter(function(c){ return CAT_ORDER.indexOf(c)===-1; }));

    var mt=document.getElementById('motto');
    if(mt) mt.textContent = all.length ? ('อัปเดตล่าสุด '+timeAgo(all[0].PubDate)) : 'กำลังรวบรวมข่าว กลับมาดูเร็วๆ นี้';

    select('all');
  }

  (function(){
    if(!LOGO_URL) return;
    var lg=document.querySelector('.logo');
    if(!lg) return;
    var probe=new Image();
    probe.onload=function(){
      lg.className='logo img-mode';
      lg.innerHTML='<img alt="มีโปรมาบอก" src="'+esc(LOGO_URL)+'">';
      var wm=document.querySelector('.wordmark');
      if(wm) wm.style.display='none';
    };
    probe.src=LOGO_URL;
  })();

  var loaded=false;
  window.__news=function(data){
    loaded=true;
    try{ build(data); }catch(err){ fail('แสดงผลไม่สำเร็จ — '+err.message); }
  };
  window.onerror=function(msg){ if(!loaded) fail(msg); };

  (function(){
    if(WEBAPP_URL.indexOf('http')!==0){ fail('ยังไม่ได้ใส่ WEBAPP_URL ในไฟล์ config.js'); return; }
    var s=document.createElement('script');
    s.src=WEBAPP_URL+'?callback=__news&t='+Date.now();
    s.onerror=function(){ fail('เชื่อมต่อ Backend ไม่ได้'); };
    document.body.appendChild(s);
    setTimeout(function(){ if(!loaded) fail('หมดเวลารอข้อมูล (Backend ไม่ตอบกลับ)'); },15000);
  })();
</script>

</body>
</html>
