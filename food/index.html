<style>
  :root{
    --paper:#FFF3EA; --surface:#FFFFFF; --ink:#2B0D13; --dim:#6E5A52;
    --red:#E01B3D; --red-2:#A50F2A; --flame:#FF6A2B;
    --gold:#C9992F; --gold-hi:#F0D488; --cream:#FFF7E8;
    --hair:rgba(43,13,19,.10); --hair-2:rgba(43,13,19,.20);
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{ background:var(--paper); color:var(--ink); font-family:'Anuphan',sans-serif; line-height:1.55; -webkit-font-smoothing:antialiased; }
  img{ display:block; max-width:100%; }
  a{ color:inherit; }

  main{ max-width:1000px; margin:0 auto; padding:20px 16px 60px; }
  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  @media(min-width:620px){ .grid{ grid-template-columns:repeat(3,1fr); gap:14px; } }
  @media(min-width:900px){ .grid{ grid-template-columns:repeat(4,1fr); gap:16px; } }

  a.fcard{
    display:flex; flex-direction:column; text-decoration:none; color:inherit;
    background:var(--surface); border:1px solid var(--hair); border-radius:14px; overflow:hidden;
    transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  a.fcard:hover{ transform:translateY(-2px); border-color:var(--hair-2); box-shadow:0 8px 20px rgba(36,16,20,.08); }
  a.fcard:active{ transform:scale(.98); }
  .fcard-media{ position:relative; aspect-ratio:1/1; background:#fff; overflow:hidden; }
  .fcard-media img{ width:100%; height:100%; object-fit:cover; }
  .fcard-badge{
    position:absolute; top:8px; right:8px; z-index:2; pointer-events:none;
    background:linear-gradient(135deg, #FF3D2E, var(--flame) 60%, #FFAA2C);
    color:#fff; font-size:11px; font-weight:700; letter-spacing:-.01em;
    padding:4px 8px; border-radius:8px; border:1.5px solid #FFF0B8;
    box-shadow:0 0 0 0 rgba(255,106,43,.6), 0 0 10px 2px rgba(255,140,40,.5), 0 0 0 1px rgba(255,255,255,.5) inset;
    text-shadow:0 1px 3px rgba(0,0,0,.28);
    animation:fbadgeGlow 1.6s ease-in-out infinite;
  }
  @keyframes fbadgeGlow{
    0%,100%{ box-shadow:0 0 0 0 rgba(255,106,43,.6), 0 0 10px 2px rgba(255,140,40,.5), 0 0 0 1px rgba(255,255,255,.5) inset; }
    50%{ box-shadow:0 0 0 5px rgba(255,106,43,0), 0 0 18px 4px rgba(255,170,44,.8), 0 0 0 1px rgba(255,255,255,.5) inset; }
  }
  .fcard-area{
    display:inline-flex; align-items:center; gap:3px;
    font-size:10.5px; color:var(--dim); font-weight:500;
  }

  /* ---------- 🔥 การ์ดสุ่มเด่นประจำชั่วโมง ---------- */
  a.fcard.hotpick{
    animation:hotpickGlow 1.3s ease-in-out infinite;
    border-color:#FF6A00;
  }
  @keyframes hotpickGlow{
    0%,100%{ box-shadow:0 0 0 0 rgba(255,80,0,.85), 0 0 16px 3px rgba(255,106,0,.9); }
    50%{ box-shadow:0 0 0 7px rgba(255,80,0,0), 0 0 34px 9px rgba(255,140,0,1); }
  }
  .fcard-hotpick-badge{
    position:absolute; left:0; right:0; bottom:0; z-index:2; pointer-events:none;
    background:linear-gradient(0deg, rgba(255,74,0,.96), rgba(255,74,0,0));
    color:#fff; font-size:11px; font-weight:700; text-align:center;
    padding:14px 6px 6px; text-shadow:0 1px 3px rgba(0,0,0,.4);
  }
  .fcard-body{ padding:10px 11px 12px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .fcard-name{
    font-size:13.5px; font-weight:600; color:var(--ink); line-height:1.4;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .fcard-cta{
    margin-top:auto; display:inline-flex; align-items:center; gap:4px;
    font-size:12px; font-weight:700; color:#fff;
    background:linear-gradient(180deg, var(--red), var(--red-2));
    border-radius:8px; padding:7px 10px; justify-content:center;
    box-shadow:0 3px 9px rgba(224,27,61,.32);
  }
  .fcard-cta::after{ content:'→'; }

  .msg{ grid-column:1/-1; text-align:center; color:var(--dim); font-size:14px; padding:50px 12px; }
  .sk{ background:var(--surface); border:1px solid var(--hair); border-radius:14px; overflow:hidden; }
  .sk-img{ aspect-ratio:1/1; background:#F2EAE4; }
  .sk-line{ height:9px; margin:10px 11px; border-radius:5px;
    background:linear-gradient(90deg, rgba(36,16,20,.05) 25%, rgba(36,16,20,.11) 37%, rgba(36,16,20,.05) 63%);
    background-size:400% 100%; animation:shim 1.4s ease infinite; }
  .sk-line.short{ width:52%; }
  @keyframes shim{ from{ background-position:100% 0; } to{ background-position:-100% 0; } }

  .note-area{
    max-width:1000px; margin:14px auto 0; padding:0 16px;
    font-size:11.5px; color:var(--dim); text-align:center; line-height:1.6;
  }
  footer{ text-align:center; padding:10px 16px 44px; }
  .notice{
    max-width:1000px; margin:16px auto 0; padding:10px 14px;
    background:#FFF9EE; border:1px solid rgba(201,153,47,.35);
    border-radius:9px; color:#7A6034; font-size:11.5px; line-height:1.55; text-align:center;
  }

  .food-header-img{ display:block; text-decoration:none; max-width:1000px; margin:0 auto; }
  .food-header-img img{ width:100%; aspect-ratio:1.83/1; object-fit:cover; display:block; }
  @media(min-width:820px){ .food-header-img{ max-width:640px; } }
  .food-header-cta{ text-align:center; padding:16px 16px 0; }
  .back-nav{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--surface); border:1.5px solid var(--ink); color:var(--ink);
    text-decoration:none; border-radius:999px; padding:9px 20px;
    font-size:13.5px; font-weight:700;
  }
  .line-fab{
    position:fixed; right:12px; bottom:14px; z-index:80;
    display:flex; align-items:center; gap:6px;
    background:#06C755; color:#fff; text-decoration:none;
    border-radius:999px; padding:8px 14px 8px 10px;
    font-family:'Anuphan',sans-serif; font-size:12.5px; font-weight:700;
    box-shadow:0 5px 16px rgba(6,199,85,.4);
    animation:lineFabIn .45s cubic-bezier(.2,1.3,.4,1);
  }
  .line-fab svg{ width:20px; height:20px; flex:0 0 auto; }
  @keyframes lineFabIn{ from{ opacity:0; transform:translateY(14px) scale(.9); } to{ opacity:1; transform:none; } }
</style>

<script src="../config.js"></script>
<script>
  var CFG = (typeof window.CATA==='object' && window.CATA) ? window.CATA : {};
  var WEBAPP_URL = String(CFG.webapp||'');
  var elGrid = document.getElementById('grid');

  var allFoods = [];

  function esc(s){
    return String(s===null||s===undefined?'':s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  var IMG_PLACEHOLDER = "data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20100%20100%22%3E%3Crect%20width=%22100%22%20height=%22100%22%20fill=%22%23F6EEE8%22/%3E%3Ctext%20x=%2250%22%20y=%2258%22%20text-anchor=%22middle%22%20font-size=%2232%22%3E%F0%9F%8D%9C%3C/text%3E%3C/svg%3E";
  function imgUrl(raw,w){
    var s=String(raw===null||raw===undefined?'':raw).trim();
    if(!s) return IMG_PLACEHOLDER;
    var m=s.match(/\/d\/([-\w]{25,})/)||s.match(/[?&]id=([-\w]{25,})/)||s.match(/^([-\w]{25,})$/);
    if(m) return 'https://lh3.googleusercontent.com/d/'+m[1]+'=w'+(w||500);
    if(!/^https?:/i.test(s) && s.indexOf('/')===-1) return '../img/'+s;
    return s;
  }
  document.addEventListener('error', function(e){
    var t=e.target;
    if(t && t.tagName==='IMG' && !t.dataset.fb){ t.dataset.fb='1'; t.src=IMG_PLACEHOLDER; }
  }, true);
  function isOn(v){ return v===true || String(v).trim().toUpperCase()==='TRUE'; }

  function track(type,name){
    try{
      if(WEBAPP_URL.indexOf('http')!==0) return;
      new Image().src = WEBAPP_URL+'?log=1&type='+encodeURIComponent(type)
        +'&name='+encodeURIComponent(String(name||'').slice(0,100))+'&cat=food&t='+Date.now();
    }catch(e){}
  }

  /* สุ่มแบบมีเมล็ด: เมล็ดเดียวกัน = ผลเหมือนกันทุกเครื่อง เปลี่ยนทุกชั่วโมงอัตโนมัติ */
  function slotIndex_(){ return Math.floor(Date.now()/(60*60*1000)); }
  function hash32_(x){
    x = x>>>0;
    x = Math.imul(x ^ (x>>>16), 0x45d9f3b);
    x = Math.imul(x ^ (x>>>16), 0x45d9f3b);
    x = (x ^ (x>>>16))>>>0;
    return x / 4294967296;
  }
  var hotPickIds_ = {};
  function buildHotPicks_(){
    hotPickIds_ = {};
    if(allFoods.length < 3) return;   // ของน้อยเกินไป ไม่เด่นก็ได้ ทุกใบเด่นเท่ากันอยู่แล้ว
    var idx = Math.floor(hash32_(slotIndex_()+919) * allFoods.length);
    hotPickIds_[idx] = 1;
  }

  function cardHtml(f, i){
    var link=String(f.Link||''); if(!link) return '';
    var badge=String(f.Badge||'').trim();
    var area=String(f.Area||'').trim();
    var isHot = !!hotPickIds_[i];
    return '<a class="fcard'+(isHot?' hotpick':'')+'" href="'+esc(link)+'" target="_blank" rel="noopener sponsored" data-name="'+esc(f.FoodName)+'">'
      + '<div class="fcard-media">'
      + (badge ? '<span class="fcard-badge">'+esc(badge)+'</span>' : '')
      + (isHot ? '<span class="fcard-hotpick-badge">🔥 แนะนำวันนี้</span>' : '')
      + '<img loading="lazy" decoding="async" alt="'+esc(f.FoodName)+'" src="'+esc(imgUrl(f.ImageURL,400))+'"></div>'
      + '<div class="fcard-body">'
      + '<div class="fcard-name">'+esc(f.FoodName)+'</div>'
      + (area ? '<span class="fcard-area">📍 '+esc(area)+'</span>' : '')
      + '<span class="fcard-cta">สั่งเลย</span>'
      + '</div></a>';
  }
  function renderGrid(){
    if(!allFoods.length){
      elGrid.innerHTML = '<div class="msg">ยังไม่มีเมนูอาหาร กลับมาดูใหม่เร็วๆ นี้นะครับ</div>';
      return;
    }
    buildHotPicks_();
    elGrid.innerHTML = allFoods.map(cardHtml).join('');
  }
  elGrid.addEventListener('click', function(e){
    var a=e.target.closest('a.fcard'); if(a) track('food_click', a.dataset.name);
  });

  function fail(msg){
    elGrid.innerHTML = '<div class="msg">โหลดเมนูไม่สำเร็จ: '+esc(msg)+'<br><a href="https://meepromabok.com/" style="color:var(--red);font-weight:700;">ไปที่หน้าหลักแทน →</a></div>';
  }

  var loaded=false;
  window.__foodPage = function(data){
    loaded=true;
    try{
      allFoods = ((data && data.foods) ? data.foods : []).filter(function(f){ return isOn(f.Active===undefined?true:f.Active) && f.Link; });
      if(!allFoods.length){
        elGrid.innerHTML = '<div class="msg">ตอนนี้ยังไม่มีเมนูอาหาร กลับมาดูใหม่เร็วๆ นี้นะครับ<br><a href="https://meepromabok.com/" style="color:var(--red);font-weight:700;">← กลับไปหน้าสินค้าลดราคา</a></div>';
      } else {
        renderGrid();
      }
      track('view_food','');
    }catch(e){ fail('แสดงผลไม่สำเร็จ'); }
  };
  (function(){
    if(WEBAPP_URL.indexOf('http')!==0){ fail('ยังไม่ได้ตั้งค่า WEBAPP_URL ใน config.js'); return; }
    var s=document.createElement('script');
    s.src=WEBAPP_URL+'?callback=__foodPage&t='+Date.now();
    s.onerror=function(){ fail('เชื่อมต่อ Backend ไม่ได้'); };
    document.body.appendChild(s);
    setTimeout(function(){ if(!loaded) fail('หมดเวลารอข้อมูล'); }, 15000);
  })();
</script>
